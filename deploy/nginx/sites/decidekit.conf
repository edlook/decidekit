# HTTP → HTTPS redirect
server {
  listen 80;
  server_name decidekit.com www.decidekit.com api.decidekit.com;

  location /.well-known/acme-challenge/ {
    root /var/www/certbot;
  }

  location / {
    return 301 https://$host$request_uri;
  }
}

# Frontend — decidekit.com
server {
  listen 443 ssl http2;
  server_name decidekit.com www.decidekit.com;

  ssl_certificate /etc/letsencrypt/live/decidekit.com/fullchain.pem;
  ssl_certificate_key /etc/letsencrypt/live/decidekit.com/privkey.pem;
  ssl_session_cache shared:SSL:10m;
  ssl_session_timeout 10m;
  ssl_protocols TLSv1.2 TLSv1.3;
  ssl_prefer_server_ciphers on;

  # Static assets cache
  location /_next/static/ {
    proxy_pass http://web:3000;
    proxy_cache_valid 200 1y;
    add_header Cache-Control "public, max-age=31536000, immutable";
  }

  # Affiliate redirect — tight rate limit
  location /r/ {
    limit_req zone=redirect burst=10 nodelay;
    proxy_pass http://web:3000;
    proxy_set_header X-Real-IP $remote_addr;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
  }

  location / {
    proxy_pass http://web:3000;
    proxy_http_version 1.1;
    proxy_set_header Upgrade $http_upgrade;
    proxy_set_header Connection 'upgrade';
    proxy_set_header Host $host;
    proxy_set_header X-Real-IP $remote_addr;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto $scheme;
    proxy_cache_bypass $http_upgrade;
    proxy_read_timeout 60s;
  }
}

# API — api.decidekit.com
server {
  listen 443 ssl http2;
  server_name api.decidekit.com;

  ssl_certificate /etc/letsencrypt/live/decidekit.com/fullchain.pem;
  ssl_certificate_key /etc/letsencrypt/live/decidekit.com/privkey.pem;
  ssl_protocols TLSv1.2 TLSv1.3;

  # Block admin endpoints from public internet
  location /api/admin/ {
    allow 10.0.0.0/8;     # Internal network only
    deny all;
    proxy_pass http://api:3001;
    proxy_set_header X-Real-IP $remote_addr;
    proxy_read_timeout 120s;
  }

  location /api/ {
    limit_req zone=api burst=40 nodelay;
    proxy_pass http://api:3001;
    proxy_http_version 1.1;
    proxy_set_header Host $host;
    proxy_set_header X-Real-IP $remote_addr;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto $scheme;
    proxy_set_header X-Country $http_cf_ipcountry;
    proxy_read_timeout 60s;
    proxy_connect_timeout 10s;
  }

  # Swagger docs (restrict to staff IPs in production)
  location /docs {
    proxy_pass http://api:3001;
  }
}
