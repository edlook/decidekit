version: '3.9'

services:

  # ── Databases ────────────────────────────────────────────────────────────

  postgres:
    image: postgres:16-alpine
    container_name: decidekit_postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${DB_NAME:-decidekitdb}
      POSTGRES_USER: ${DB_USER:-postgres}
      POSTGRES_PASSWORD: ${DB_PASS:?DB_PASS required}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ['CMD-SHELL', 'pg_isready -U ${DB_USER:-postgres}']
      interval: 10s
      timeout: 5s
      retries: 5
    networks: [internal]

  redis:
    image: redis:7-alpine
    container_name: decidekit_redis
    restart: unless-stopped
    command: redis-server --appendonly yes --requirepass ${REDIS_PASSWORD:-redispass}
    volumes:
      - redis_data:/data
    healthcheck:
      test: ['CMD', 'redis-cli', '-a', '${REDIS_PASSWORD:-redispass}', 'ping']
      interval: 10s
      timeout: 5s
      retries: 5
    networks: [internal]

  opensearch:
    image: opensearchproject/opensearch:2.12.0
    container_name: decidekit_opensearch
    restart: unless-stopped
    environment:
      - discovery.type=single-node
      - DISABLE_SECURITY_PLUGIN=true
      - OPENSEARCH_JAVA_OPTS=-Xms512m -Xmx512m
    volumes:
      - opensearch_data:/usr/share/opensearch/data
    healthcheck:
      test: ['CMD-SHELL', 'curl -sf http://localhost:9200/_cluster/health | grep -q "status"']
      interval: 15s
      timeout: 10s
      retries: 10
    networks: [internal]

  # ── Application ──────────────────────────────────────────────────────────

  api:
    build:
      context: ./api
      dockerfile: Dockerfile
    container_name: decidekit_api
    restart: unless-stopped
    env_file: .env.production
    environment:
      NODE_ENV: production
      DB_HOST: postgres
      DB_PORT: 5432
      REDIS_HOST: redis
      REDIS_PORT: 6379
      OPENSEARCH_URL: http://opensearch:9200
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      opensearch:
        condition: service_healthy
    networks: [internal, public]
    labels:
      - "traefik.enable=false"  # Using Nginx instead

  web:
    build:
      context: ./ai-commerce-platform
      dockerfile: Dockerfile
    container_name: decidekit_web
    restart: unless-stopped
    environment:
      NODE_ENV: production
      NEXT_PUBLIC_API_URL: ${NEXT_PUBLIC_API_URL:-https://api.decidekit.com/api}
    depends_on:
      - api
    networks: [internal, public]

  # ── Reverse proxy ────────────────────────────────────────────────────────

  nginx:
    image: nginx:1.25-alpine
    container_name: decidekit_nginx
    restart: unless-stopped
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./deploy/nginx/nginx.conf:/etc/nginx/nginx.conf:ro
      - ./deploy/nginx/sites:/etc/nginx/sites-enabled:ro
      - certbot_certs:/etc/letsencrypt:ro
      - certbot_www:/var/www/certbot:ro
    depends_on:
      - web
      - api
    networks: [public]

  certbot:
    image: certbot/certbot:latest
    container_name: decidekit_certbot
    volumes:
      - certbot_certs:/etc/letsencrypt
      - certbot_www:/var/www/certbot
    entrypoint: "/bin/sh -c 'trap exit TERM; while :; do certbot renew; sleep 12h & wait $${!}; done;'"
    profiles: [ssl]

volumes:
  postgres_data:
  redis_data:
  opensearch_data:
  certbot_certs:
  certbot_www:

networks:
  internal:
    driver: bridge
    internal: true
  public:
    driver: bridge
